<!DOCTYPE html>
<html lang="kO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css">
    <script src="js/jquery-3.7.1.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/common.js"></script>
    <script src="js/counter.js"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link rel="stylesheet" href="css/main.css">
    <title>usopang</title>
</head>
<body>
    <div class="skip_nav">
        <a href="#skip_contents">본문 바로가기</a>
        <a href="#skip_nav">대메뉴 바로가기</a>
    </div>
    <div id="wrap">
        <header>
            <h1>usopang</h1>
            <nav class="gnb">
                <button class="gnb_open">메뉴열기</button>
                <div class="gnb_wrap">
                    <ul class="depth1">
                        <li>
                            <a href="#n">ABOUT US</a>
                        </li>
                        <li>
                            <a href="#n">MENU</a>
                        </li>
                        <li>
                            <a href="#n">EVENT</a>
                        </li>
                        <li>
                            <a href="#n">REVIEW</a>
                        </li>
                        <li>
                            <a href="#n">빵</a>
                        </li>
                    </ul>
                </div>
                <button class="gnb_close">메뉴닫기</button>
            </nav>
        </header>
        <main class="container">
            <section class="visual">
                <div class="wrapper">
                    <h2>visual</h2>
                    <strong>USOPANG</strong>
                    <div class="swiper">
                        <ul class="swiper-wrapper">
                            <li class="swiper-slide">
                                <div class="photo">
                                    <img src="images/main/visual_1.png" alt="플레인 소금빵 사진">
                                </div>
                            </li>
                            <li class="swiper-slide">
                                <div class="photo">
                                    <img src="images/main/visual_2.png" alt="에그 소금빵 사진">
                                </div>
                            </li>
                            <li class="swiper-slide">
                                <div class="photo">
                                    <img src="images/main/visual_3.png" alt="우유 소금빵 사진">
                                </div>
                            </li>
                            <li class="swiper-slide">
                                <div class="photo">
                                    <img src="images/main/visual_4.png" alt="치즈 소금빵 사진">
                                </div>
                            </li>
                        </ul>
                    </div>
                    <span>a small bread, a big smile</span>
                </div>
            </section>
            <section class="ingredients">
                <h2>ingredients</h2>
                <div class="wrapper">
                    <div class="txt_box">
                        <div class="butter">
                            <strong>High Quality</strong>
                            <div class="photo b">
                                <img src="images/main/butter.png" alt="버터 그림">
                            </div>
                            <span>Butter</span>
                        </div>
                        <div class="milk">
                            <strong>Fresh</strong>
                            <div class="photo m">
                                <img src="images/main/milk.png" alt="젖소 그림">
                            </div>
                            <span>Milk</span>
                        </div>
                        <div class="heart">
                            <strong>A warm</strong>
                            <div class="photo h">
                                <img src="images/main/heart.png" alt="하트 그림">
                            </div>
                            <span>Heart</span>
                        </div>
                        <div class="salt">
                            <strong>Premium</strong>
                            <div class="photo s">
                                <img src="images/main/salt.png" alt="소금 그림">
                            </div>
                            <span>Salt</span>
                        </div>
                    </div>
                </div>
            </section>
            <section class="menu"></section>
            <section class="event"></section>
            <section class="place"></section>
            <section class="review"></section>
        </main>
        <footer></footer>
    </div>
</body>
</html>
